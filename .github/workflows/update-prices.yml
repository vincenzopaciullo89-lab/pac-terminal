name: Update prices daily

on:
  schedule:
    # Ogni giorno alle 06:00 UTC (07:00 ora invernale Italia, 08:00 ora legale)
    # NB: GitHub a volte ritarda i cron schedules di 5-30 min, è normale
    - cron: '0 6 * * *'

  # Permette esecuzione manuale dal tab Actions
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Necessario per fare commit dei prezzi aggiornati

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance==0.2.50

      - name: Fetch prices from Yahoo Finance
        run: python scripts/fetch_prices.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain data/prices.json) ]]; then
            git add data/prices.json
            git commit -m "chore: aggiornamento prezzi automatico $(date +%Y-%m-%d)"
            git push
            echo "✅ Prezzi committati"
          else
            echo "ℹ️ Nessun cambiamento, skip commit"
          fi
