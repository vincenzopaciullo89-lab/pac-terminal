name: Drawdown Alert

on:
  schedule:
    # Ogni giorno alle 06:30 UTC = 07:30 italiano (08:30 con ora legale)
    # NB: GitHub a volte ritarda i cron di 5-30 min, è normale
    - cron: '30 6 * * *'

  # Permette esecuzione manuale dal tab Actions
  workflow_dispatch:

jobs:
  check-drawdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run drawdown check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_THRESHOLD: '-0.05'  # -5% DD12M
        run: python scripts/drawdown_alert.py
