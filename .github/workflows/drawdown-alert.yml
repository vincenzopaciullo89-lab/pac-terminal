name: Drawdown Alert

on:
  schedule:
    # Ogni giorno alle 06:30 UTC (07:30 CET / 08:30 CEST)
    - cron: '30 6 * * *'

  workflow_dispatch:

# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 fa girare actions/checkout e
# actions/setup-python sul runtime Node 24 invece del Node 20 deprecato
# (sunset ~2 giugno 2026). Soluzione preferita al bump versione-per-versione
# di ciascuna action: agisce uniformemente, niente regressioni da pinning.
# Coerente con la stessa scelta in update-prices.yml (PR #18).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-drawdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run drawdown check
        env:
          SHEET_HISTORY_URL: ${{ secrets.SHEET_HISTORY_URL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_THRESHOLD: '-0.05'
        run: python scripts/drawdown_alert.py
