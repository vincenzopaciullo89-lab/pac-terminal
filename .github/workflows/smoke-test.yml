# =============================================================================
# smoke-test.yml — DIAGNOSTIC ONLY
# =============================================================================
# Esegue una probe one-shot di yfinance e Stooq sui 5 ticker PAC Terminal e
# stampa una tabella di compatibilità (Markdown) sia su stdout sia nel Job
# Summary del run, così è facilmente leggibile dalla UI di Actions.
#
# Trigger esclusivo: workflow_dispatch (manuale). Nessuno schedule.
# Non scrive file, non committa nulla, non manda email.
# Da rimuovere insieme allo script .github/scripts/smoke_prices.py dopo l'uso.
# =============================================================================
name: smoke-test (diagnostic)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          # Versioni testate localmente nel sandbox preflight.
          pip install yfinance==1.3.0 'pandas>=2.0,<4.0' requests

      - name: Run smoke probe
        run: |
          set -o pipefail
          python3 .github/scripts/smoke_prices.py | tee -a "$GITHUB_STEP_SUMMARY"
